services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: zetta
      POSTGRES_USER: zetta
      POSTGRES_PASSWORD: zetta
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    environment:
      CLICKHOUSE_DB: zetta
      CLICKHOUSE_USER: zetta
      CLICKHOUSE_PASSWORD: zetta
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./infra/clickhouse/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

  redpanda:
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    volumes:
      - redpanda-data:/var/lib/redpanda/data

  minio:
    image: minio/minio:RELEASE.2025-05-24T17-08-30Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: zettaadmin
      MINIO_ROOT_PASSWORD: zettaadmin
    ports:
      - "9001:9001"
      - "9002:9000"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  clickhouse-data:
  redpanda-data:
  minio-data:
